<html lang="en">

    <meta name="viewport"

    <meta charset="UTF-8">
    <title>Scriptures</title>

    <style>
        /* COMPATIBILITY FIX: Global Animation Kill Switch for E-ink */
        *,
        *::before,
        *::after {
            transition: none !important;
            animation: none !important;
        }

        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
        }

        body {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            background-repeat: repeat;
            background-position: top left;
            font-family: "Georgia", serif;
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: 4px 4px 0px black;
            display: flex;
            flex-direction: column;
            min-height: 95vh;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        .window.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / var(--rekindle-scale, 1));
            height: calc(100vh / var(--rekindle-scale, 1));
            max-width: none;
            max-height: none;
            border: none;
            box-shadow: none;
            z-index: 2000;
            transform-origin: top left !important;
        }

        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            position: relative;
            flex-shrink: 0;
            font-family: "Helvetica Neue", "Geneva", sans-serif;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
            z-index: 0;
        }

        .title-text {
            font-weight: bold;
            background: white;
            padding: 0 15px;
            z-index: 1;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px;
            border-bottom: 2px solid black;
            background: #eee;
            font-family: inherit;
            flex-wrap: wrap;
            gap: 4px;
        }

        .controls-group {
            display: flex;
            align-items: center;
        }

        select {
            font-family: "Geneva", "Verdana", sans-serif;
            font-size: 0.9rem;
            padding: 4px 8px;
            border: 2px solid black;
            font-weight: bold;
            margin-right: 5px;
            background: white;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            appearance: none;
            -webkit-appearance: none;
            border-radius: 0;
        }

        select:active {
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 4px 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-size: 0.85rem;
            font-family: "Geneva", "Verdana", sans-serif;
            margin-left: 5px;
        }

        .sys-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        #reader-view {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .verse {
            margin-bottom: 8px;
        }

        .verse-num {
            font-size: 0.75rem;
            font-weight: bold;
            vertical-align: super;
            margin-right: 4px;
            color: #333;
            user-select: none;
        }

        .chapter-heading {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            border-bottom: 2px solid black;
            padding-bottom: 10px;
        }

        .sub-heading {
            font-size: 1.2rem;
            font-weight: bold;
            text-align: center;
            margin-top: -10px;
            margin-bottom: 20px;
            color: #333;
        }

        #loading-indicator {
            position: absolute;
            top: 35px;
            left: 0;
            width: 100%;
            height: calc(100% - 35px);
            background: white;
            display: none;
            justify-content: center;
            align-items: center;
            font-family: "Geneva", "Verdana", sans-serif;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 50;
        }
        
        .footer {
            border-top: 2px solid black;
            display: flex;
            justify-content: space-between;
            background: #eee;
        }

        .nav-btn {
            flex: 1;
            background: white;
            border: none;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: "Geneva", "Verdana", sans-serif;
        }
        
        .nav-btn:active {
            background: black;
            color: white;
        }
        
        #prev-btn { border-right: 1px solid black; }
        #next-btn { border-left: 1px solid black; }
        
        .nav-btn:disabled {
            color: #999;
            cursor: not-allowed;
            background: #eee;
        }
        .nav-btn:disabled:active {
            background: #eee;
            color: #999;
        }

        .settings-overlay {
            position: absolute;
            top: 35px;
            right: 0;
            width: 200px;
            background: white;
            border-left: 2px solid black;
            border-bottom: 2px solid black;
            display: none;
            flex-direction: column;
            z-index: 100;
            box-shadow: -2px 2px 0 black;
            padding: 10px;
            font-family: "Geneva", "Verdana", sans-serif;
        }

        .settings-overlay label {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
            display: block;
        }

        .settings-overlay .custom-select-container {
            width: 100%;
            min-width: unset;
            margin-bottom: 10px;
        }

        .settings-overlay .custom-select-trigger {
            width: 100%;
            box-sizing: border-box;
        }

        .toolbar .custom-select-container {
            margin-right: 5px;
        }

    </style>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="location.href='index'">X</div>
            <span class="title-text" id="app-title">Scriptures</span>
        </div>

        <div class="toolbar">
            <div class="controls-group">
                <select id="lib-select" onchange="onLibraryChange()">
                    <option value="bible">Bible</option>
                    <option value="quran">Quran</option>
                    <option value="dhammapada">Dhammapada</option>
                    <option value="tao">Tao Te Ching</option>
                </select>
                <select id="book-select" onchange="onBookChange()"></select>
                <select id="ch-select" onchange="onChapterChange()"></select>
            </div>
            <div class="controls-group">
                <button class="sys-btn" onclick="toggleSettings()">&#9881;</button>
            </div>
        </div>
        
        <div class="settings-overlay" id="settings-menu">
            <div id="trans-setting">
                <label for="trans-select">Translation</label>
                <select id="trans-select" onchange="onTranslationChange()"></select>
            </div>
            
            <label for="font-size-select">Font Size</label>
            <select id="font-size-select" onchange="onFontSizeChange()">
                <option value="1rem">Small</option>
                <option value="1.2rem" selected>Medium</option>
                <option value="1.5rem">Large</option>
                <option value="1.8rem">X-Large</option>
            </select>
            
            <button class="sys-btn" style="width: 100%; margin: 0;" onclick="toggleSettings()">Close</button>
        </div>

        <div id="reader-view">
            <!-- Content will be injected here -->
        </div>

        <div class="footer">
            <button id="prev-btn" class="nav-btn" onclick="navChapter(-1)">&#9664; Previous</button>
            <button id="next-btn" class="nav-btn" onclick="navChapter(1)">Next &#9654;</button>
        </div>

        <div id="loading-indicator">
            <div>Loading...</div>
        </div>
    </div>

    { name: "Al-Bayyina", ar: "سُورَةُ البَيِّنَةِ", verses: 8 },
    { name: "Az-Zalzala", ar: "سُورَةُ الزَّلۡزَلَةِ", verses: 8 },
    { name: "Al-Aadiyaat", ar: "سُورَةُ العَادِيَاتِ", verses: 11 },
    { name: "Al-Qaari'a", ar: "سُورَةُ القَارِعَةِ", verses: 11 },
    { name: "At-Takaathur", ar: "سُورَةُ التَّكَاثُرِ", verses: 8 },
    { name: "Al-Asr", ar: "سُورَةُ العَصۡرِ", verses: 3 },
    { name: "Al-Humaza", ar: "سُورَةُ الهُمَزَةِ", verses: 9 },
    { name: "Al-Fil", ar: "سُورَةُ الفِيلِ", verses: 5 },
    { name: "Quraish", ar: "سُورَةُ قُرَيۡشٍ", verses: 4 },
    { name: "Al-Maa'un", ar: "سُورَةُ المَاعُونِ", verses: 7 },
    { name: "Al-Kawthar", ar: "سُورَةُ الكَوۡثَرِ", verses: 3 },
    { name: "Al-Kaafiroon", ar: "سُورَةُ الكَافِرُونَ", verses: 6 },
    { name: "An-Nasr", ar: "سُورَةُ النَّصۡرِ", verses: 3 },
    { name: "Al-Masad", ar: "سُورَةُ المَسَدِ", verses: 5 },
    { name: "Al-Ikhlaas", ar: "سُورَةُ الإِخۡلَاصِ", verses: 4 },
    { name: "Al-Falaq", ar: "سُورَةُ الفَلَقِ", verses: 5 },
    { name: "An-Naas", ar: "سُورَةُ النَّاسِ", verses: 6 },
];

        const STATE_VERSION = 4;
        let currentLibrary = 'bible';
        let currentBookIdx = 0;
        let currentChapter = 1;
        let currentTranslation = 'web';
        let dhammapadaData = null;
        let dhammapadaThanData = null;
        let taoData = null;
        let taoMitchellData = null;

        const TRANSLATIONS = {
            bible: [
                { id: 'kjv', name: 'King James (KJV)' },
                { id: 'web', name: 'World English (WEB)' },
                { id: 'bbe', name: 'Basic English (BBE)' },
                { id: 'asv', name: 'American Standard (ASV)' },
                { id: 'darby', name: 'Darby Bible' },
                { id: 'dra', name: 'Douay-Rheims (DRA)' },
                { id: 'ylt', name: "Young's Literal (YLT)" },
                { id: 'oeb-cw', name: 'Open English Bible (CW)' },
                { id: 'webbe', name: 'World English Bible (UK)' },
                { id: 'oeb-us', name: 'Open English Bible (US)' },
                { id: 'clementine', name: 'Clementine Vulgate (Latin)' },
                { id: 'almeida', name: 'João Ferreira de Almeida (Portuguese)' },
                { id: 'rccv', name: 'Cornilescu Version (Romanian)' },
                { id: 'synodal', name: 'Russian Synodal' },
                { id: 'cherokee', name: 'Cherokee New Testament' },
                { id: 'cuv', name: 'Chinese Union Version' },
                { id: 'bkr', name: 'Bible kralická (Czech)' }
            ],
            quran: [
                { id: 'eng-abdelhaleem', name: 'English - Abdel Haleem' },
                { id: 'eng-yusufaliorig', name: 'English - Yusuf Ali' },
                { id: 'eng-safiurrahmanalm', name: 'English - Sahih International' },
                { id: 'eng-muhammadasad', name: 'English - Muhammad Asad' },
                { id: 'eng-mustafakhattaba', name: 'English - Clear Quran' },
                { id: 'eng-talalitani', name: 'English - Talal Itani' },
                { id: 'eng-literal', name: 'English - Literal' },
                { id: 'ara-quransimple', name: 'Arabic - Simple' },
                { id: 'ara-quranuthmanihaf', name: 'Arabic - Uthmani' },
                { id: 'fra-islamicfoundati', name: 'French' },
                { id: 'deu-aburidamuhammad', name: 'German' },
                { id: 'spa-abdulqadermouhe', name: 'Spanish' },
                { id: 'rus-abuadel', name: 'Russian' },
                { id: 'ind-indonesianislam', name: 'Indonesian' },
                { id: 'msa-abdullahmuhamma', name: 'Malay' },
                { id: 'ben-abubakrzakaria', name: 'Bengali' },
                { id: 'hin-muhammadfarooqk', name: 'Hindi' },
                { id: 'fas-abdolmohammaday', name: 'Persian' },
                { id: 'por-helminasr', name: 'Portuguese' },
                { id: 'ita-hamzarobertopic', name: 'Italian' },
                { id: 'jpn-ryoichimita', name: 'Japanese' },
                { id: 'kor-hamidchoi', name: 'Korean' },
                { id: 'nld-fredleemhuis', name: 'Dutch' },
                { id: 'pol-jozefabielawski', name: 'Polish' },
                { id: 'ron-georgegrigore', name: 'Romanian' },
                { id: 'sin-naseemismailand', name: 'Sinhala' },
                { id: 'mya-alinuyin', name: 'Burmese' },
                { id: 'afr-imammabaker', name: 'Afrikaans' },
                { id: 'amh-muhammedsadiqan', name: 'Amharic' },
                { id: 'aze-alikhanmusayev', name: 'Azerbaijani' },
                { id: 'bul-tzvetantheophan', name: 'Bulgarian' },
                { id: 'ces-arnykl', name: 'Czech' },
                { id: 'dan-hadiabdollahian', name: 'Danish' },
                { id: 'fin-unknown', name: 'Finnish' },
                { id: 'heb-darusalamhousei', name: 'Hebrew' },
                { id: 'hrv-unknown', name: 'Croatian' },
                { id: 'hun-drahmedabdelrah', name: 'Hungarian' },
                { id: 'kaz-khalifahaltai', name: 'Kazakh' },
                { id: 'kir-shamsaldinhakim', name: 'Kyrgyz' },
                { id: 'mal-abdulhameedmada', name: 'Malayalam' },
                { id: 'mar-muhammadshafiia', name: 'Marathi' },
                { id: 'mkd-macedonianschol', name: 'Macedonian' },
                { id: 'nep-ahlalhadithcent', name: 'Nepali' },
                { id: 'nor-einarberg', name: 'Norwegian' },
                { id: 'pan-drmuhamadhabibb', name: 'Punjabi' },
                { id: 'slk-hadiabdollahian', name: 'Slovak' },
                { id: 'som-abdullahhasanja', name: 'Somali' },
                { id: 'sna-abdullahjmadini', name: 'Shona' },
                { id: 'sot-sheikheliaskeke', name: 'Sotho' },
                { id: 'cat-yousseflyoussi', name: 'Catalan' },
                { id: 'epo-hadiabdollahian', name: 'Esperanto' },
                { id: 'fil-abdullatifeduar', name: 'Filipino' },
                { id: 'guj-rabilaalomari', name: 'Gujarati' },
                { id: 'jav-unknown', name: 'Javanese' },
                { id: 'kan-abdussalamputhi', name: 'Kannada' },
                { id: 'lat-hadiabdollahian', name: 'Latin' },
                { id: 'prs-mawlawimuhammad', name: 'Dari' },
                { id: 'pus-abdulwalikhan', name: 'Pashto' },
                { id: 'snd-tajmehmoodamrot', name: 'Sindhi' }
            ],
            dhammapada: [
                { id: 'buddharakkhita', name: 'Acharya Buddharakkhita' },
                { id: 'thanissaro', name: 'Thanissaro Bhikkhu' }
            ],
            tao: [
                { id: 'legge', name: 'James Legge' },
                { id: 'mitchell', name: 'Stephen Mitchell' }
            ]
        };

        const DEFAULT_TRANSLATIONS = { bible: 'web', quran: 'eng-abdelhaleem', dhammapada: 'buddharakkhita', tao: 'legge' };

        function getBooks() {
            if (currentLibrary === 'bible') return BIBLE_BOOKS;
            if (currentLibrary === 'quran') return QURAN_SURAHS.map(s => ({ name: s.name, ch: 1 }));
            if (currentLibrary === 'dhammapada') {
                const data = (currentTranslation === 'thanissaro') ? dhammapadaThanData : dhammapadaData;
                return [{ name: 'Dhammapada', ch: data ? data.chapters.length : 26 }];
            }
            if (currentLibrary === 'tao') {
                const data = (currentTranslation === 'mitchell') ? taoMitchellData : taoData;
                return [{ name: 'Tao Te Ching', ch: data ? data.chapters.length : 81 }];
            }
            return [];
        }

        function getMaxChapter() {
            const books = getBooks();
            return books[currentBookIdx] ? books[currentBookIdx].ch : 1;
        }

        async function init() {
            // Pre-load all local scripture data
            try {
                const [dResp, dThanResp, tResp, tMitchResp] = await Promise.all([
                    fetch('data/dhammapada.json'),
                    fetch('data/dhammapada-than.json'),
                    fetch('data/tao-te-ching.json'),
                    fetch('data/tao-te-ching-mitchell.json')
                ]);
                dhammapadaData = await dResp.json();
                dhammapadaThanData = await dThanResp.json();
                taoData = await tResp.json();
                taoMitchellData = await tMitchResp.json();
            } catch(e) {}

            try {
                const saved = localStorage.getItem('rekindle_scriptures_state');
                if (saved) {
                    const state = JSON.parse(saved);
                    if (state.v === STATE_VERSION) {
                        currentLibrary = state.lib || 'bible';
                        currentBookIdx = parseInt(state.b) || 0;
                        currentChapter = parseInt(state.c) || 1;
                        if (state.t && typeof state.t === 'object') {
                            currentTranslation = state.t[currentLibrary] || DEFAULT_TRANSLATIONS[currentLibrary];
                        } else {
                            // v3 fallback: old string format
                            currentTranslation = state.t || DEFAULT_TRANSLATIONS[currentLibrary];
                        }
                        const fz = state.fz || '1.2rem';
                        document.getElementById('font-size-select').value = fz;
                        document.getElementById('reader-view').style.fontSize = fz;
                    }
                }
            } catch(e) {}

            document.getElementById('lib-select').value = currentLibrary;
            updateUIForLibrary();
            document.getElementById('trans-select').value = currentTranslation;
            populateBooks();
            populateChapters();
            updateNavButtons();
            fetchChapter();
        }

        function saveState() {
            try {
                const fontSz = document.getElementById('font-size-select').value;
                let state = JSON.parse(localStorage.getItem('rekindle_scriptures_state') || '{}');
                if (state.v !== STATE_VERSION) state = { v: STATE_VERSION, t: {} };
                if (!state.t || typeof state.t !== 'object') state.t = {};
                state.lib = currentLibrary;
                state.b = currentBookIdx;
                state.c = currentChapter;
                state.t[currentLibrary] = currentTranslation;
                state.fz = fontSz;
                localStorage.setItem('rekindle_scriptures_state', JSON.stringify(state));
            } catch(e) {}
        }

        function updateUIForLibrary() {
            const transSelect = document.getElementById('trans-select');
            const transOptions = TRANSLATIONS[currentLibrary];
            if (transOptions && transOptions.length > 0) {
                document.getElementById('trans-setting').style.display = 'block';
                transSelect.innerHTML = '';
                for (let i = 0; i < transOptions.length; i++) {
                    const opt = document.createElement('option');
                    opt.value = transOptions[i].id;
                    opt.textContent = transOptions[i].name;
                    transSelect.appendChild(opt);
                }
                transSelect.value = currentTranslation;
            } else {
                document.getElementById('trans-setting').style.display = 'none';
            }
            const chSelect = document.getElementById('ch-select');
            const chCustom = chSelect.nextElementSibling;
            if (chCustom && chCustom.classList.contains('custom-select-container')) {
                chCustom.style.display = (currentLibrary === 'quran') ? 'none' : 'inline-block';
            }
        }

        function populateBooks() {
            const bookSelect = document.getElementById('book-select');
            bookSelect.innerHTML = '';
            const books = getBooks();
            for (let i = 0; i < books.length; i++) {
                const opt = document.createElement('option');
                opt.value = i;
                opt.textContent = books[i].name;
                bookSelect.appendChild(opt);
            }
            if (currentBookIdx >= books.length) currentBookIdx = 0;
            bookSelect.value = currentBookIdx;
        }

        function populateChapters() {
            const chSelect = document.getElementById('ch-select');
            chSelect.innerHTML = '';
            const maxCh = getMaxChapter();
            if (currentLibrary === 'dhammapada') {
                const data = (currentTranslation === 'thanissaro') ? dhammapadaThanData : dhammapadaData;
                if (data) {
                    for (let i = 1; i <= maxCh; i++) {
                        const title = data.chapters[i - 1].title;
                        const opt = document.createElement('option');
                        opt.value = i;
                        opt.textContent = 'Ch ' + i + ': ' + title;
                        chSelect.appendChild(opt);
                    }
                }
            } else {
                for (let i = 1; i <= maxCh; i++) {
                    const opt = document.createElement('option');
                    opt.value = i;
                    opt.textContent = 'Ch ' + i;
                    chSelect.appendChild(opt);
                }
            }
            if (currentChapter > maxCh) currentChapter = maxCh;
            if (currentChapter < 1) currentChapter = 1;
            chSelect.value = currentChapter;
        }

        function onLibraryChange() {
            currentLibrary = document.getElementById('lib-select').value;
            currentBookIdx = 0;
            currentChapter = 1;
            currentTranslation = DEFAULT_TRANSLATIONS[currentLibrary] || 'web';
            updateUIForLibrary();
            populateBooks();
            populateChapters();
            fetchChapter();
        }

        function onBookChange() {
            currentBookIdx = parseInt(document.getElementById('book-select').value);
            currentChapter = 1;
            populateChapters();
            document.getElementById('ch-select').value = currentChapter;
            fetchChapter();
        }

        function onChapterChange() {
            currentChapter = parseInt(document.getElementById('ch-select').value);
            fetchChapter();
        }

        function navChapter(dir) {
            let nextCh = currentChapter + dir;
            let nextBookIdx = currentBookIdx;
            const books = getBooks();
            if (currentLibrary === 'quran') {
                nextBookIdx = currentBookIdx + dir;
                nextCh = 1;
                if (nextBookIdx < 0 || nextBookIdx >= books.length) return;
            } else {
                if (nextCh < 1) {
                    if (currentBookIdx === 0) return;
                    nextBookIdx = currentBookIdx - 1;
                    nextCh = books[nextBookIdx].ch;
                } else if (nextCh > books[currentBookIdx].ch) {
                    if (currentBookIdx === books.length - 1) return;
                    nextBookIdx = currentBookIdx + 1;
                    nextCh = 1;
                }
            }
            currentBookIdx = nextBookIdx;
            currentChapter = nextCh;
            document.getElementById('book-select').value = currentBookIdx;
            populateChapters();
            document.getElementById('ch-select').value = currentChapter;
            fetchChapter();
        }

        function updateNavButtons() {
            const prev = document.getElementById('prev-btn');
            const next = document.getElementById('next-btn');
            const books = getBooks();
            if (currentBookIdx === 0 && currentChapter === 1) {
                prev.disabled = true;
            } else {
                prev.disabled = false;
            }
            const lastBook = books.length - 1;
            const lastCh = books[lastBook].ch;
            if (currentBookIdx === lastBook && currentChapter === lastCh) {
                next.disabled = true;
            } else {
                next.disabled = false;
            }
        }

        function toggleSettings() {
            const sm = document.getElementById('settings-menu');
            sm.style.display = (sm.style.display === 'flex') ? 'none' : 'flex';
        }

        function onTranslationChange() {
            currentTranslation = document.getElementById('trans-select').value;
            toggleSettings();
            fetchChapter();
        }

        function onFontSizeChange() {
            document.getElementById('reader-view').style.fontSize = document.getElementById('font-size-select').value;
            saveState();
        }

        async function fetchChapter() {
            saveState();
            updateNavButtons();
            const reader = document.getElementById('reader-view');
            const loader = document.getElementById('loading-indicator');
            loader.style.display = 'flex';
            try {
                let html = '';
                if (currentLibrary === 'bible') html = await fetchBible();
                else if (currentLibrary === 'quran') html = await fetchQuran();
                else if (currentLibrary === 'dhammapada') html = await fetchDhammapada();
                else if (currentLibrary === 'tao') html = await fetchTao();
                reader.innerHTML = html;
                reader.scrollTop = 0;
            } catch (err) {
                reader.innerHTML = "<div style='text-align:center; margin-top:20px;'><b>Error</b><br>" + escapeHTML(err.toString()) + "</div>";
            } finally {
                loader.style.display = 'none';
            }
        }

        async function fetchBible() {
            const books = getBooks();
            const bookName = books[currentBookIdx].name;
            const ref = bookName + " " + currentChapter;
            const url = "https://bible-api.com/" + encodeURIComponent(ref) + "?translation=" + currentTranslation + "&single_chapter_book_matching=indifferent";
            const response = await fetch(url);
            const data = await response.json();
            if (data.error) throw new Error(data.error);
            let html = '<h2 class="chapter-heading">' + escapeHTML(ref) + '</h2>';
            for (let i = 0; i < data.verses.length; i++) {
                const v = data.verses[i];
                const text = v.text.replace(/\n/g, ' ').trim();
                html += '<div class="verse"><span class="verse-num">' + v.verse + '</span><span class="verse-text">' + escapeHTML(text) + '</span></div>';
            }
            return html;
        }

        async function fetchQuran() {
            const surahNo = currentBookIdx + 1;
            const surah = QURAN_SURAHS[currentBookIdx];
            const edition = currentTranslation || 'eng-abdelhaleem';
            const url = 'https://raw.githubusercontent.com/fawazahmed0/quran-api/1/editions/' + edition + '/' + surahNo + '.json';
            const response = await fetch(url);
            const data = await response.json();
            let html = '<h2 class="chapter-heading">Surah ' + surahNo + ': ' + escapeHTML(surah.name) + '</h2>';
            html += '<div class="sub-heading">' + escapeHTML(surah.ar) + ' &mdash; ' + surah.verses + ' verses</div>';
            for (let i = 0; i < data.chapter.length; i++) {
                const v = data.chapter[i];
                html += '<div class="verse"><span class="verse-num">' + v.verse + '</span><span class="verse-text">' + escapeHTML(v.text) + '</span></div>';
            }
            return html;
        }

        async function fetchDhammapada() {
            let data = dhammapadaData;
            if (currentTranslation === 'thanissaro') {
                if (!dhammapadaThanData) {
                    const resp = await fetch('data/dhammapada-than.json');
                    dhammapadaThanData = await resp.json();
                }
                data = dhammapadaThanData;
            } else {
                if (!dhammapadaData) {
                    const resp = await fetch('data/dhammapada.json');
                    dhammapadaData = await resp.json();
                }
                data = dhammapadaData;
            }
            const chapter = data.chapters[currentChapter - 1];
            let html = '<h2 class="chapter-heading">Ch ' + currentChapter + ': ' + escapeHTML(chapter.title) + '</h2>';
            for (let i = 0; i < chapter.verses.length; i++) {
                const v = chapter.verses[i];
                html += '<div class="verse"><span class="verse-num">' + v.no + '</span><span class="verse-text">' + escapeHTML(v.text) + '</span></div>';
            }
            return html;
        }

        async function fetchTao() {
            let data = taoData;
            if (currentTranslation === 'mitchell') {
                if (!taoMitchellData) {
                    const resp = await fetch('data/tao-te-ching-mitchell.json');
                    taoMitchellData = await resp.json();
                }
                data = taoMitchellData;
            } else {
                if (!taoData) {
                    const resp = await fetch('data/tao-te-ching.json');
                    taoData = await resp.json();
                }
                data = taoData;
            }
            const chapter = data.chapters[currentChapter - 1];
            let html = '<h2 class="chapter-heading">Chapter ' + chapter.no + '</h2>';
            const paragraphs = chapter.text.split('\n\n');
            for (let i = 0; i < paragraphs.length; i++) {
                const p = paragraphs[i].trim();
                if (p) {
                    html += '<p style="margin-bottom: 12px;">' + escapeHTML(p).replace(/\n/g, '<br>') + '</p>';
                }
            }
            return html;
        }

        function escapeHTML(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        window.onload = () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            if (window.rekindleApplyDefaultFullscreen) window.rekindleApplyDefaultFullscreen();
            init();
        };
    </script>

<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    <title data-i18n="pinterest.title">Pinterest</title>
    <style>
        /* E-INK COMPATIBILITY */
        *,
        *::before,
        *::after {
            transition: none !important;
            animation: none !important;
        }

        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            width: 100%;
            max-width: 650px;
            position: relative;
        }

        .window.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / var(--rekindle-scale, 1));
            height: calc(100vh / var(--rekindle-scale, 1));
            max-width: none;
            max-height: none;
            border: none;
            box-shadow: none;
            z-index: 2000;
            transform-origin: top left !important;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .title-controls {
            position: absolute;
            right: 10px;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .icon-btn {
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0 black;
            padding: 0;
        }

        .icon-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .icon-contract {
            display: none;
        }

        .window.fullscreen .icon-expand {
            display: none;
        }

        .window.fullscreen .icon-contract {
            display: inline;
        }

        .logout-btn {
            margin-right: 8px;
            font-size: 0.8rem;
            padding: 2px 6px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-weight: bold;
            font-family: inherit;
        }

        .logout-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        /* CONTENT AREA */
        .content {
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* APP VIEWS */
        .app-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .scroll-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: white;
        }

        /* LOGIN VIEW */
        #login-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
            overflow-y: auto;
            background: white;
            z-index: 10;
        }

        .login-card {
            border: 2px solid black;
            padding: 30px;
            max-width: 320px;
            width: 100%;
            background: #fafafa;
            box-shadow: 4px 4px 0 #ccc;
        }

        .login-card h2 {
            margin-top: 0;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0 black;
            font-size: 1rem;
            margin-top: 10px;
            font-family: inherit;
        }

        .sys-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        .sys-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 3px 3px 0 black;
        }

        /* TOOLBAR */
        .toolbar {
            padding: 10px;
            border-bottom: 2px solid black;
            background: #eee;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .toolbar input {
            flex-grow: 1;
            border: 2px solid black;
            padding: 8px;
            font-family: inherit;
            font-size: 1rem;
            margin-right: 10px;
            box-sizing: border-box;
        }

        .toolbar .sys-btn {
            margin-top: 0;
            padding: 8px 14px;
            font-size: 0.9rem;
            box-shadow: 2px 2px 0 black;
        }

        .toolbar .sys-btn:active {
            transform: translate(2px, 2px);
        }

        /* PIN CARD */
        .pin-card {
            border-bottom: 2px solid black;
            padding: 15px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .pin-card:active {
            background: black;
            color: white;
        }

        .pin-card:active .pin-title {
            color: white;
        }

        .pin-card:active .pin-desc {
            color: #ddd;
        }

        .pin-card:active .pin-domain {
            color: #ccc;
        }

        .pin-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .pin-desc {
            font-size: 0.9rem;
            color: #444;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pin-image {
            max-width: 100%;
            max-height: 120px;
            border: 2px solid black;
            margin-bottom: 8px;
            object-fit: cover;
            image-rendering: pixelated;
            display: block;
        }

        .pin-domain {
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
        }

        /* BOARD CARD */
        .board-card {
            border-bottom: 2px solid black;
            padding: 15px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .board-card:active {
            background: black;
            color: white;
        }

        .board-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .board-meta {
            font-size: 0.8rem;
            color: #666;
        }

        .board-card:active .board-meta {
            color: #ccc;
        }

        /* BOARDS GRID */
        #boards-list {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            align-content: flex-start;
        }

        #boards-list .board-card {
            width: calc(50% - 20px);
            margin: 10px;
            border: 2px solid black;
            box-shadow: 3px 3px 0 black;
            min-height: 100px;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        #boards-list .board-card:active {
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        /* PINS GRID (for search + board pins) */
        .pins-grid {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            align-content: flex-start;
        }

        .pins-grid .pin-card {
            width: calc(50% - 20px);
            margin: 10px;
            border: 2px solid black;
            box-shadow: 3px 3px 0 black;
            padding: 10px;
        }

        .pins-grid .pin-card:active {
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        .pins-grid .pin-image {
            width: 100%;
            height: 100px;
            object-fit: cover;
            margin-bottom: 8px;
        }

        .pins-grid .pin-title {
            font-size: 0.9rem;
        }

        .pins-grid .pin-desc {
            display: none;
        }

        /* PROFILE */
        .profile-header {
            padding: 20px;
            border-bottom: 2px solid black;
            background: #fafafa;
            text-align: center;
        }

        .profile-name {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .profile-handle {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 10px;
        }

        /* STATUS MSG */
        .status-msg {
            color: red;
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.9rem;
            min-height: 1.2em;
        }

        /* LOADING */
        .loading {
            padding: 20px;
            text-align: center;
            font-style: italic;
        }

        .empty-msg {
            padding: 30px;
            text-align: center;
            font-style: italic;
            color: #666;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            height: 50px;
            border-top: 2px solid black;
            display: none;
            background: white;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
        }

        .nav-item {
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-right: 1px solid #ccc;
        }

        .nav-item:last-child {
            border-right: none;
        }

        .nav-item:active,
        .nav-item.active {
            background: #eee;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        .nav-label {
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* SUB HEADER (for back navigation) */
        .sub-header {
            padding: 10px;
            border-bottom: 2px solid black;
            background: #eee;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .sub-header .sys-btn {
            margin-top: 0;
            margin-right: 10px;
            padding: 4px 10px;
            font-size: 0.8rem;
            box-shadow: 2px 2px 0 black;
        }

        .sub-header .sys-btn:active {
            transform: translate(2px, 2px);
        }

        .sub-header-title {
            font-weight: bold;
            font-size: 1rem;
        }
    </style>

    <!-- Firebase for Pro Gate -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="theme.js?v=18"></script>
    <script src="pro-gate.js"></script>
    <script src="js/i18n.js"></script>
</head>

<body>
    <div class="window">
        <!-- TITLE BAR -->
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text" data-i18n="pinterest.title">Pinterest</span>
            <div class="title-controls">
                <button id="logout-btn" class="logout-btn" onclick="app.logout()" style="display:none;"
                    data-i18n="pinterest.logout.btn">Disconnect</button>
                <button class="icon-btn" onclick="app.toggleFullScreen()" title="Full Screen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="square" stroke-linejoin="miter">
                        <path class="icon-expand" d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"></path>
                        <path class="icon-contract" d="M21 9H15V3M21 3l-6 6M3 15h6v6M3 21l6-6"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="content">
            <!-- LOGIN VIEW -->
            <div id="login-view">
                <div class="login-card">
                    <h2 data-i18n="pinterest.login.title">Pinterest</h2>
                    <p data-i18n="pinterest.login.desc" style="font-size:0.9rem; margin-bottom:20px;">Connect your
                        Pinterest account to browse ideas, search pins, and view your boards.</p>
                    <button class="sys-btn" onclick="app.connect()" data-i18n="pinterest.login.btn">Connect
                        Pinterest</button>
                    <div id="login-status" class="status-msg"></div>
                </div>
            </div>

            <!-- SEARCH VIEW -->
            <div id="search-view" class="app-view">
                <div class="toolbar">
                    <input type="text" id="search-input" data-i18n-placeholder="pinterest.search.placeholder"
                        placeholder="Search for ideas..." onkeypress="app.handleSearchKey(event)">
                    <button class="sys-btn" onclick="app.performSearch()"
                        data-i18n="pinterest.search.btn">Search</button>
                </div>
                <div id="search-results" class="scroll-list"></div>
            </div>

            <!-- BOARDS VIEW -->
            <div id="boards-view" class="app-view">
                <div id="boards-list" class="scroll-list">
                    <div class="loading" data-i18n="pinterest.loading">Loading...</div>
                </div>
            </div>

            <!-- BOARD PINS VIEW -->
            <div id="board-pins-view" class="app-view">
                <div class="sub-header">
                    <button class="sys-btn" onclick="app.showBoards()">&lt; Back</button>
                    <span id="board-pins-title" class="sub-header-title">Board</span>
                </div>
                <div id="board-pins-list" class="scroll-list"></div>
            </div>

            <!-- PROFILE VIEW -->
            <div id="profile-view" class="app-view">
                <div id="profile-container" class="scroll-list">
                    <div class="profile-header">
                        <div id="profile-name" class="profile-name">User</div>
                        <div id="profile-handle" class="profile-handle">@user</div>
                        <button class="sys-btn" onclick="app.logout()"
                            data-i18n="pinterest.logout.btn">Disconnect</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div id="bottom-nav" class="bottom-nav">
            <div class="nav-item active" onclick="app.switchTab('search')">
                <span class="nav-label" data-i18n="pinterest.tab.search">Search</span>
            </div>
            <div class="nav-item" onclick="app.switchTab('boards')">
                <span class="nav-label" data-i18n="pinterest.tab.boards">Boards</span>
            </div>
            <div class="nav-item" onclick="app.switchTab('profile')">
                <span class="nav-label" data-i18n="pinterest.tab.profile">Profile</span>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        // Replace with your Pinterest App ID from https://developers.pinterest.com
        const PINTEREST_CLIENT_ID = "1574822";
        const WORKER_BASE = "https://rekindle-pinterest.timjarnott.workers.dev";
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        const app = {
            token: null,
            refreshToken: null,
            tokenExpiry: 0,
            currentTab: 'search',
            currentBoardId: null,

            init() {
                if (window.I18n) window.I18n.init();
                if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
                if (window.rekindleApplyScale) window.rekindleApplyScale();

                // Check for OAuth callback
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                if (error) {
                    document.getElementById('login-status').textContent = "Connection cancelled or failed.";
                    this.showLogin();
                    return;
                }

                if (code) {
                    // Verify state
                    const savedState = localStorage.getItem('pinterest_oauth_state');
                    if (savedState && savedState !== state) {
                        document.getElementById('login-status').textContent = "Security error: state mismatch.";
                        this.showLogin();
                        return;
                    }
                    localStorage.removeItem('pinterest_oauth_state');
                    this.exchangeCode(code);
                    return;
                }

                // Check for saved token
                const savedToken = localStorage.getItem('pinterest_access_token');
                const savedRefresh = localStorage.getItem('pinterest_refresh_token');
                const savedExpiry = localStorage.getItem('pinterest_token_expiry');

                if (savedToken) {
                    this.token = savedToken;
                    this.refreshToken = savedRefresh;
                    this.tokenExpiry = parseInt(savedExpiry || '0', 10);

                    // Refresh if expired or about to expire (within 5 min)
                    if (this.tokenExpiry && Date.now() >= this.tokenExpiry - 300000) {
                        this.doRefresh();
                    } else {
                        this.showApp();
                    }
                } else {
                    this.showLogin();
                }
            },

            // --- OAuth Flow ---
            connect() {
                if (PINTEREST_CLIENT_ID === "YOUR_PINTEREST_APP_ID") {
                    document.getElementById('login-status').textContent = "App not configured. Set PINTEREST_CLIENT_ID.";
                    return;
                }

                const state = this.randomString(32);
                localStorage.setItem('pinterest_oauth_state', state);

                const scopes = "pins:read boards:read user_accounts:read";
                const authUrl = `https://www.pinterest.com/oauth/?client_id=${PINTEREST_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=${encodeURIComponent(scopes)}&state=${state}`;

                window.location.href = authUrl;
            },

            async exchangeCode(code) {
                const statusEl = document.getElementById('login-status');
                statusEl.textContent = "Connecting...";

                try {
                    const res = await fetch(`${WORKER_BASE}/oauth`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
                    });

                    const data = await res.json();

                    if (data.access_token) {
                        this.token = data.access_token;
                        this.refreshToken = data.refresh_token;
                        // Pinterest tokens expire in 30 days; use expires_in if provided
                        const expiresIn = data.expires_in || (30 * 24 * 60 * 60);
                        this.tokenExpiry = Date.now() + (expiresIn * 1000);

                        localStorage.setItem('pinterest_access_token', this.token);
                        localStorage.setItem('pinterest_refresh_token', this.refreshToken || '');
                        localStorage.setItem('pinterest_token_expiry', this.tokenExpiry.toString());

                        // Clean URL
                        window.history.replaceState({}, document.title, window.location.pathname);
                        this.showApp();
                    } else {
                        statusEl.textContent = data.error_description || data.error || "Connection failed.";
                    }
                } catch (e) {
                    statusEl.textContent = "Network error. Please try again.";
                }
            },

            async doRefresh() {
                if (!this.refreshToken) {
                    this.logout();
                    return;
                }
                try {
                    const res = await fetch(`${WORKER_BASE}/refresh`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ refresh_token: this.refreshToken })
                    });
                    const data = await res.json();
                    if (data.access_token) {
                        this.token = data.access_token;
                        const expiresIn = data.expires_in || (30 * 24 * 60 * 60);
                        this.tokenExpiry = Date.now() + (expiresIn * 1000);
                        localStorage.setItem('pinterest_access_token', this.token);
                        localStorage.setItem('pinterest_token_expiry', this.tokenExpiry.toString());
                        if (data.refresh_token) {
                            this.refreshToken = data.refresh_token;
                            localStorage.setItem('pinterest_refresh_token', this.refreshToken);
                        }
                        this.showApp();
                    } else {
                        this.logout();
                    }
                } catch (e) {
                    this.logout();
                }
            },

            // --- UI Navigation ---
            showLogin() {
                document.getElementById('login-view').style.display = 'flex';
                document.getElementById('bottom-nav').style.display = 'none';
                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('logout-btn').style.display = 'none';
            },

            showApp() {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'flex';
                document.getElementById('logout-btn').style.display = 'inline-block';
                this.switchTab('search');
            },

            switchTab(tabName) {
                this.currentTab = tabName;

                document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
                const tabs = ['search', 'boards', 'profile'];
                const idx = tabs.indexOf(tabName);
                if (idx >= 0) document.querySelectorAll('.nav-item')[idx].classList.add('active');

                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('login-view').style.display = 'none';

                if (tabName === 'search') {
                    document.getElementById('search-view').style.display = 'flex';
                } else if (tabName === 'boards') {
                    document.getElementById('boards-view').style.display = 'flex';
                    this.loadBoards();
                } else if (tabName === 'profile') {
                    document.getElementById('profile-view').style.display = 'flex';
                    this.loadProfile();
                }
            },

            toggleFullScreen() {
                document.querySelector('.window').classList.toggle('fullscreen');
            },

            logout() {
                this.token = null;
                this.refreshToken = null;
                this.tokenExpiry = 0;
                localStorage.removeItem('pinterest_access_token');
                localStorage.removeItem('pinterest_refresh_token');
                localStorage.removeItem('pinterest_token_expiry');
                document.getElementById('boards-list').dataset.loaded = 'false';
                this.showLogin();
            },

            // --- API Helpers ---
            async apiGet(endpoint, params = {}) {
                if (!this.token) throw new Error("Not authenticated");

                const url = new URL(`${WORKER_BASE}/api${endpoint}`);
                Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));

                const res = await fetch(url.toString(), {
                    headers: { "Authorization": `Bearer ${this.token}` }
                });

                const data = await res.json();
                if (!res.ok) {
                    throw new Error(data.message || data.error || `HTTP ${res.status}`);
                }
                return data;
            },

            // --- Search ---
            handleSearchKey(e) {
                if (e.key === 'Enter') this.performSearch();
            },

            async performSearch() {
                const query = document.getElementById('search-input').value.trim();
                if (!query) return;

                const container = document.getElementById('search-results');
                container.innerHTML = '<div class="loading">Searching...</div>';

                try {
                    const data = await this.apiGet('/search/pins', { query: query, page_size: 20 });
                    this.renderPins(data.items || [], container);
                } catch (e) {
                    container.innerHTML = `<div class="empty-msg">Error: ${this.escapeHtml(e.message)}</div>`;
                }
            },

            // --- Boards ---
            async loadBoards() {
                const container = document.getElementById('boards-list');
                if (container.dataset.loaded === 'true') return;

                container.innerHTML = '<div class="loading">Loading boards...</div>';

                try {
                    const data = await this.apiGet('/boards', { page_size: 50 });
                    this.renderBoards(data.items || [], container);
                    container.dataset.loaded = 'true';
                } catch (e) {
                    container.innerHTML = `<div class="empty-msg">Error: ${this.escapeHtml(e.message)}</div>`;
                }
            },

            renderBoards(boards, container) {
                container.innerHTML = '';

                if (boards.length === 0) {
                    container.innerHTML = '<div class="empty-msg" data-i18n="pinterest.boards.empty">No boards found.</div>';
                    return;
                }

                boards.forEach(board => {
                    const el = document.createElement('div');
                    el.className = 'board-card';

                    let coverHtml = '';
                    if (board.media && board.media.pin_thumbnail_urls && board.media.pin_thumbnail_urls[0]) {
                        coverHtml = `<img src="${this.escapeHtml(board.media.pin_thumbnail_urls[0])}" style="width:100%;height:60px;object-fit:cover;border:1px solid black;margin-bottom:8px;image-rendering:pixelated;" alt="">`;
                    }

                    el.innerHTML = `
                        ${coverHtml}
                        <div class="board-name">${this.escapeHtml(board.name || 'Untitled')}</div>
                        <div class="board-meta">${board.pin_count || 0} pins &middot; ${this.escapeHtml(board.privacy || 'Public')}</div>
                    `;
                    el.onclick = () => this.loadBoardPins(board.id, board.name);
                    container.appendChild(el);
                });
            },

            async loadBoardPins(boardId, boardName) {
                this.currentBoardId = boardId;
                document.getElementById('board-pins-title').textContent = this.escapeHtml(boardName || 'Board');

                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('board-pins-view').style.display = 'flex';

                const container = document.getElementById('board-pins-list');
                container.innerHTML = '<div class="loading">Loading pins...</div>';

                try {
                    const data = await this.apiGet(`/boards/${boardId}/pins`, { page_size: 25 });
                    this.renderPins(data.items || [], container);
                } catch (e) {
                    container.innerHTML = `<div class="empty-msg">Error: ${this.escapeHtml(e.message)}</div>`;
                }
            },

            showBoards() {
                document.getElementById('board-pins-view').style.display = 'none';
                document.getElementById('boards-view').style.display = 'flex';
            },

            // --- Pin Rendering ---
            renderPins(pins, container) {
                container.innerHTML = '';
                container.classList.add('pins-grid');

                if (pins.length === 0) {
                    container.innerHTML = '<div class="empty-msg">No pins found.</div>';
                    return;
                }

                pins.forEach(pin => {
                    const el = document.createElement('div');
                    el.className = 'pin-card';

                    let imgHtml = '';
                    if (pin.media && pin.media.images && pin.media.images['600x']) {
                        const imgUrl = pin.media.images['600x'].url;
                        imgHtml = `<img class="pin-image" src="${this.escapeHtml(imgUrl)}" alt="${this.escapeHtml(pin.alt_text || pin.title || '')}" loading="lazy">`;
                    }

                    const title = pin.title || 'Untitled Pin';
                    const domain = pin.link ? new URL(pin.link).hostname.replace('www.', '') : '';

                    el.innerHTML = `
                        ${imgHtml}
                        <div class="pin-title">${this.escapeHtml(title)}</div>
                        ${domain ? `<div class="pin-domain">${this.escapeHtml(domain)}</div>` : ''}
                    `;

                    if (pin.link) {
                        el.onclick = () => window.open(pin.link, '_blank');
                    }

                    container.appendChild(el);
                });
            },

            // --- Profile ---
            async loadProfile() {
                const container = document.getElementById('profile-container');

                try {
                    const data = await this.apiGet('/user_account');
                    const username = data.username || 'User';
                    const profileImage = data.profile_image || '';
                    const about = data.about || '';
                    const website = data.website_url || '';

                    let statsHtml = '';
                    if (data.board_count != null || data.pin_count != null || data.follower_count != null) {
                        statsHtml = `
                            <div style="display:flex; justify-content:center; margin-top:15px; font-size:0.9rem;">
                                ${data.board_count != null ? `<div style="margin:0 10px;"><strong>${data.board_count}</strong><br>Boards</div>` : ''}
                                ${data.pin_count != null ? `<div style="margin:0 10px;"><strong>${data.pin_count}</strong><br>Pins</div>` : ''}
                                ${data.follower_count != null ? `<div style="margin:0 10px;"><strong>${data.follower_count}</strong><br>Followers</div>` : ''}
                            </div>
                        `;
                    }

                    let imgHtml = '';
                    if (profileImage) {
                        imgHtml = `<img src="${this.escapeHtml(profileImage)}" style="width:80px;height:80px;border:2px solid black;border-radius:50%;margin-bottom:10px;background:#ccc;object-fit:cover;image-rendering:pixelated;" alt="Profile">`;
                    }

                    let aboutHtml = '';
                    if (about) {
                        aboutHtml = `<div style="margin-top:10px;font-size:0.9rem;color:#444;max-width:300px;margin-left:auto;margin-right:auto;">${this.escapeHtml(about)}</div>`;
                    }

                    let websiteHtml = '';
                    if (website) {
                        websiteHtml = `<div style="margin-top:8px;font-size:0.85rem;"><a href="${this.escapeHtml(website)}" target="_blank" style="color:#000;text-decoration:underline;">${this.escapeHtml(website.replace(/^https?:\/\//, ''))}</a></div>`;
                    }

                    container.innerHTML = `
                        <div class="profile-header">
                            ${imgHtml}
                            <div class="profile-name">${this.escapeHtml(username)}</div>
                            <div class="profile-handle">@${this.escapeHtml(username)}</div>
                            ${aboutHtml}
                            ${websiteHtml}
                            ${statsHtml}
                            <button class="sys-btn" onclick="app.logout()" data-i18n="pinterest.logout.btn" style="margin-top:15px;">Disconnect</button>
                        </div>
                    `;
                } catch (e) {
                    container.innerHTML = `
                        <div class="profile-header">
                            <div class="profile-name">User</div>
                            <div class="profile-handle">@user</div>
                            <div style="margin-top:10px;color:red;font-size:0.85rem;">Failed to load profile.<br>${this.escapeHtml(e.message)}</div>
                            <button class="sys-btn" onclick="app.logout()" data-i18n="pinterest.logout.btn" style="margin-top:15px;">Disconnect</button>
                        </div>
                    `;
                }
            },

            // --- Utilities ---
            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            randomString(len) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let result = '';
                for (let i = 0; i < len; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }
        };

        // --- Init ---
        window.onload = () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            if (window.rekindleApplyScale) window.rekindleApplyScale();
            if (window.rekindleAutoDetectScale) window.rekindleAutoDetectScale();
            if (window.rekindleApplyDefaultFullscreen) window.rekindleApplyDefaultFullscreen();

            if (window.rekindleProGate) {
                window.rekindleProGate.check(isPro => {
                    if (isPro) {
                        app.init();
                    }
                });
            } else {
                app.init();
            }
        };
    </script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>Moderation — ReKindle</title>
    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background-color: #e5e5e5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 860px;
            margin-top: 20px;
        }

        .title-bar {
            background: var(--stripe-pattern);
            border-bottom: 2px solid black;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            user-select: none;
        }

        .title-bar > * + * {
            margin-left: 8px;
        }

        .title-bar-text {
            background: white;
            font-weight: bold;
            font-size: 13px;
            padding: 1px 8px;
            flex: 1;
            text-align: center;
        }

        .title-bar-btn {
            width: 14px;
            height: 14px;
            border: 2px solid black;
            background: white;
            flex-shrink: 0;
        }

        .content {
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .content > * + * {
            margin-top: 16px;
        }

        .controls-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .controls-row > * + * {
            margin-left: 12px;
        }

        label {
            font-size: 12px;
            font-weight: bold;
        }

        select, button {
            font-family: "Geneva", "Verdana", sans-serif;
            font-size: 12px;
            border: 2px solid black;
            background: white;
            padding: 4px 8px;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
        }

        button:active {
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: black;
            color: white;
        }

        .status-bar {
            font-size: 11px;
            color: #555;
            border-top: 1px solid #ccc;
            padding-top: 8px;
            min-height: 16px;
        }

        .output-area {
            display: none;
            flex-direction: column;
        }

        .output-area > * + * {
            margin-top: 8px;
        }

        .output-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .output-label {
            font-size: 12px;
            font-weight: bold;
        }

        .copy-btn {
            font-size: 11px;
            padding: 3px 10px;
        }

        textarea.output-text {
            font-family: "Courier New", monospace;
            font-size: 11px;
            border: 2px solid black;
            padding: 10px;
            resize: vertical;
            min-height: 400px;
            width: 100%;
            box-sizing: border-box;
            white-space: pre;
            overflow: auto;
            line-height: 1.5;
        }

        .stats-row {
            font-size: 11px;
            color: #444;
            display: flex;
            flex-wrap: wrap;
        }

        .stats-row > * + * {
            margin-left: 20px;
        }

        .stat-item {
            border: 1px solid #ccc;
            padding: 3px 8px;
        }

        #auth-gate {
            padding: 40px 20px;
            text-align: center;
            font-size: 13px;
        }

        #auth-gate p {
            margin: 8px 0;
            color: #555;
        }

        .section-toggle {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .section-toggle > * + * {
            margin-left: 10px;
        }

        .section-toggle label {
            display: flex;
            align-items: center;
            font-weight: normal;
            cursor: pointer;
        }

        .section-toggle label > * + * {
            margin-left: 4px;
        }

        .section-toggle input[type="checkbox"] {
            cursor: pointer;
        }

        .divider {
            border: none;
            border-top: 1px solid #ccc;
            margin: 4px 0;
        }

        .automod-window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: none;
            flex-direction: column;
            width: 100%;
            max-width: 860px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .automod-controls {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
        }

        .automod-controls > * + * {
            margin-left: 12px;
        }

        .log-entry {
            border: 1px solid #ccc;
            padding: 10px 12px;
            font-size: 11px;
            font-family: "Courier New", monospace;
            line-height: 1.6;
        }

        .log-entry + .log-entry {
            border-top: none;
        }

        .log-entry .log-header {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }

        .log-entry .log-header > * + * {
            margin-left: 10px;
        }

        .log-entry .log-time {
            font-weight: bold;
        }

        .badge {
            font-family: "Geneva", "Verdana", sans-serif;
            font-size: 10px;
            font-weight: bold;
            padding: 1px 6px;
            border: 1px solid black;
            white-space: nowrap;
        }

        .badge-dryrun { background: #fffacd; }
        .badge-live   { background: #d4edda; }
        .badge-nuke   { background: #f8d7da; }
        .badge-timeout { background: #fff3cd; }
        .badge-skip   { background: #e2e3e5; }
        .badge-error  { background: #f5c6cb; }

        .log-summary {
            color: #444;
            font-style: italic;
            margin-bottom: 6px;
        }

        .log-actions {
            display: flex;
            flex-direction: column;
        }

        .log-actions > * + * {
            margin-top: 3px;
        }

        .log-action-row {
            display: flex;
            align-items: baseline;
        }

        .log-action-row > * + * {
            margin-left: 8px;
        }

        .log-action-user {
            font-weight: bold;
            min-width: 120px;
        }

        .log-action-reason {
            color: #555;
            font-style: italic;
        }

        .strikes-grid {
            display: flex;
            flex-direction: column;
            font-size: 11px;
            font-family: "Courier New", monospace;
        }

        .strike-row {
            display: flex;
            align-items: center;
            padding: 6px 10px;
            border: 1px solid #ccc;
            flex-wrap: wrap;
        }

        .strike-row > * + * {
            margin-left: 12px;
        }

        .strike-row + .strike-row {
            border-top: none;
        }

        .strike-user {
            font-weight: bold;
            min-width: 130px;
        }

        .strike-count {
            font-size: 13px;
            font-weight: bold;
        }

        .strike-count.at-limit { color: #c00; }

        .strike-timeout {
            font-weight: bold;
            min-width: 90px;
            color: #8a4800;
        }

        .strike-history {
            color: #555;
            flex: 1;
        }

        .no-data {
            font-size: 11px;
            color: #888;
            font-style: italic;
            padding: 8px 0;
        }

        #main-ui > * + * {
            margin-top: 16px;
        }
</style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <div class="title-bar-btn"></div>
        <div class="title-bar-text">Moderation — ReKindle Admin</div>
        <div class="title-bar-btn"></div>
    </div>

    <div class="content">
        <div id="auth-gate">
            <p>Checking authentication...</p>
        </div>

        <div id="main-ui" style="display:none; flex-direction:column;">
            <div class="controls-row">
                <label for="time-range">Time range:</label>
                <select id="time-range">
                    <option value="1">Last 24 hours</option>
                    <option value="2">Last 2 days</option>
                    <option value="3">Last 3 days</option>
                    <option value="7" selected>Last 7 days</option>
                    <option value="14">Last 14 days</option>
                    <option value="30">Last 30 days</option>
                    <option value="60">Last 60 days</option>
                    <option value="90">Last 90 days</option>
                </select>

                <hr class="divider" style="width:1px;height:24px;border:none;border-left:1px solid #ccc;margin:0;">

                <div class="section-toggle">
                    <span style="font-size:12px;font-weight:bold;">Include:</span>
                    <label><input type="checkbox" id="inc-chat" checked> KindleChat</label>
                    <label><input type="checkbox" id="inc-neighbourhood" checked> Neighbourhood</label>
                    <label><input type="checkbox" id="inc-topics" checked> Topics</label>
                    <label><input type="checkbox" id="inc-comments" checked> Topic comments</label>
                </div>

                <button class="btn-primary" id="fetch-btn" onclick="fetchData()">Fetch Messages</button>
            </div>

            <div class="status-bar" id="status">Ready. Select a time range and click Fetch.</div>

            <div class="output-area" id="output-area">
                <div class="output-header">
                    <span class="output-label">Report output (paste into AI):</span>
                    <button class="copy-btn" onclick="copyOutput()">Copy to Clipboard</button>
                </div>
                <div class="stats-row" id="stats-row"></div>
                <textarea class="output-text" id="output-text" readonly></textarea>
            </div>
        </div>
    </div>
</div>

<div class="automod-window" id="automod-window">
    <div class="title-bar">
        <div class="title-bar-btn"></div>
        <div class="title-bar-text">Automod Log</div>
        <div class="title-bar-btn"></div>
    </div>
    <div class="content">
        <div class="automod-controls">
            <label for="log-limit">Show last:</label>
            <select id="log-limit">
                <option value="20">20 runs</option>
                <option value="50" selected>50 runs</option>
                <option value="100">100 runs</option>
            </select>
            <button class="btn-primary" onclick="fetchAutomodLog()">Refresh</button>
        </div>
        <div class="status-bar" id="automod-status">Loading...</div>

        <div id="strikes-section">
            <div style="font-size:12px;font-weight:bold;margin-bottom:6px;">Strike Records</div>
            <div class="strikes-grid" id="strikes-grid"><div class="no-data">Loading...</div></div>
        </div>

        <hr class="divider">

        <div>
            <div style="font-size:12px;font-weight:bold;margin-bottom:6px;">Recent Runs</div>
            <div id="log-entries"><div class="no-data">Loading...</div></div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
<script>
    var firebaseConfig = {
        apiKey: "AIzaSyDY7x7vVmlYUyVZNLuCCmIQYa6PWFVfZqQ",
        authDomain: "rekindle-dd1fa.firebaseapp.com",
        projectId: "rekindle-dd1fa",
        storageBucket: "rekindle-dd1fa.firebasestorage.app",
        messagingSenderId: "748026882518",
        appId: "1:748026882518:web:6877dd4329318070c11c77",
        databaseURL: "https://rekindle-dd1fa-default-rtdb.firebaseio.com/"
    };

    firebase.initializeApp(firebaseConfig);
    var auth = firebase.auth();
    var rtdb = firebase.database();

    var ADMIN_EMAIL = 'ukiyo@rekindle.ink';

    auth.onAuthStateChanged(function(user) {
        var gate = document.getElementById('auth-gate');
        var mainUI = document.getElementById('main-ui');

        if (!user) {
            gate.innerHTML = '<p style="font-weight:bold;">Access denied.</p><p>You must be signed in as the admin account to view this page.</p>';
            mainUI.style.display = 'none';
            return;
        }

        if (user.email !== ADMIN_EMAIL) {
            gate.innerHTML = '<p style="font-weight:bold;">Access denied.</p><p>This page is only accessible to the ReKindle admin.</p><p style="font-size:11px;color:#999;">Signed in as: ' + escapeHtml(user.email) + '</p>';
            mainUI.style.display = 'none';
            return;
        }

        gate.style.display = 'none';
        mainUI.style.display = 'flex';
        document.getElementById('automod-window').style.display = 'flex';
        fetchAutomodLog();
    });

    function setStatus(msg) {
        document.getElementById('status').textContent = msg;
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function formatDate(ts) {
        if (!ts) return '?';
        var d = new Date(ts);
        var pad = function(n) { return n < 10 ? '0' + n : n; };
        return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate())
             + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function formatDateLong(ts) {
        if (!ts) return '?';
        return new Date(ts).toUTCString();
    }

    // Cache of uid -> display name to avoid redundant reads
    var uidNameCache = {};

    async function resolveUid(uid) {
        if (!uid) return '?';
        if (uidNameCache[uid]) return uidNameCache[uid];
        try {
            var snap = await rtdb.ref('users_public/' + uid).once('value');
            var data = snap.val();
            var name = (data && (data.displayName || data.email)) ? (data.displayName || data.email.split('@')[0]) : uid.substring(0, 8);
            uidNameCache[uid] = name;
            return name;
        } catch (e) {
            return uid.substring(0, 8);
        }
    }

    async function fetchData() {
        var btn = document.getElementById('fetch-btn');
        btn.disabled = true;
        uidNameCache = {};

        var days = parseInt(document.getElementById('time-range').value, 10);
        var cutoff = Date.now() - (days * 24 * 60 * 60 * 1000);
        var incChat = document.getElementById('inc-chat').checked;
        var incNeighbourhood = document.getElementById('inc-neighbourhood').checked;
        var incTopics = document.getElementById('inc-topics').checked;
        var incComments = document.getElementById('inc-comments').checked;

        var lines = [];
        var chatCount = 0;
        var neighbourhoodCount = 0;
        var neighbourhoodCommentCount = 0;
        var topicCount = 0;
        var commentCount = 0;

        var rangeLabel = document.getElementById('time-range').options[document.getElementById('time-range').selectedIndex].text;

        lines.push('=== REKINDLE MODERATION REPORT ===');
        lines.push('Period: ' + rangeLabel + ' (from ' + formatDateLong(cutoff) + ')');
        lines.push('Generated: ' + formatDateLong(Date.now()));
        lines.push('');

        try {
            // --- KindleChat messages ---
            if (incChat) {
                setStatus('Fetching KindleChat messages...');
                var chatSnap = await rtdb.ref('kindlechat/messages')
                    .orderByChild('timestamp')
                    .startAt(cutoff)
                    .once('value');

                var chatMessages = [];
                chatSnap.forEach(function(child) {
                    var msg = child.val();
                    if (msg && msg.timestamp >= cutoff) {
                        chatMessages.push({ ts: msg.timestamp, user: msg.user || '?', text: msg.text || '' });
                    }
                });
                chatMessages.sort(function(a,b){ return a.ts - b.ts; });
                chatCount = chatMessages.length;

                lines.push('=== KINDLECHAT MESSAGES (' + chatCount + ' messages) ===');
                if (chatMessages.length === 0) {
                    lines.push('(no messages in this period)');
                } else {
                    chatMessages.forEach(function(m) {
                        lines.push('[' + formatDate(m.ts) + '] ' + m.user + ': ' + m.text);
                    });
                }
                lines.push('');
            }

            // --- Neighbourhood posts ---
            if (incNeighbourhood) {
                setStatus('Fetching Neighbourhood posts...');
                var nbSnap = await rtdb.ref('neighbourhood_posts')
                    .orderByChild('timestamp')
                    .startAt(cutoff)
                    .once('value');

                var nbPosts = [];
                nbSnap.forEach(function(child) {
                    var p = child.val();
                    if (p && p.timestamp >= cutoff) {
                        nbPosts.push({ id: child.key, uid: p.uid || '', text: p.text || '', ts: p.timestamp || 0, comments: p.comments || null });
                    }
                });
                nbPosts.sort(function(a,b){ return a.ts - b.ts; });
                neighbourhoodCount = nbPosts.length;

                lines.push('=== NEIGHBOURHOOD POSTS (' + nbPosts.length + ' posts) ===');
                if (nbPosts.length === 0) {
                    lines.push('(no posts in this period)');
                } else {
                    for (var ni = 0; ni < nbPosts.length; ni++) {
                        var np = nbPosts[ni];
                        setStatus('Resolving Neighbourhood post ' + (ni+1) + ' of ' + nbPosts.length + '...');
                        var npName = await resolveUid(np.uid);
                        lines.push('');
                        lines.push('POST by ' + npName + ' [' + formatDate(np.ts) + ']: ' + np.text);

                        // Comments are nested under the post node
                        if (np.comments) {
                            var nbComments = [];
                            Object.keys(np.comments).forEach(function(cid) {
                                var c = np.comments[cid];
                                if (c && c.timestamp >= cutoff) {
                                    nbComments.push({ uid: c.uid || '', text: c.text || '', ts: c.timestamp || 0 });
                                }
                            });
                            nbComments.sort(function(a,b){ return a.ts - b.ts; });
                            neighbourhoodCommentCount += nbComments.length;

                            for (var nci = 0; nci < nbComments.length; nci++) {
                                var nc = nbComments[nci];
                                var ncName = await resolveUid(nc.uid);
                                lines.push('  [' + formatDate(nc.ts) + '] ' + ncName + ': ' + nc.text);
                            }
                        }
                    }
                }
                lines.push('');
            }

            // --- Topics & Comments ---
            if (incTopics || incComments) {
                setStatus('Fetching topics...');
                var topicsSnap = await rtdb.ref('topics')
                    .orderByChild('lastActive')
                    .startAt(cutoff)
                    .once('value');

                var topics = [];
                topicsSnap.forEach(function(child) {
                    var t = child.val();
                    if (t) {
                        topics.push({
                            id: child.key,
                            title: t.title || '(untitled)',
                            subheading: t.subheading || '',
                            body: t.body || '',
                            authorName: t.authorName || '?',
                            timestamp: t.timestamp || 0,
                            lastActive: t.lastActive || 0
                        });
                    }
                });
                topics.sort(function(a,b){ return a.timestamp - b.timestamp; });

                lines.push('=== TOPICS & COMMENTS ===');

                for (var i = 0; i < topics.length; i++) {
                    var topic = topics[i];

                    var topicInRange = topic.timestamp >= cutoff;
                    var commentsData = [];

                    if (incComments) {
                        setStatus('Fetching comments for topic ' + (i+1) + ' of ' + topics.length + '...');
                        var commSnap = await rtdb.ref('topic_comments/' + topic.id)
                            .orderByChild('timestamp')
                            .startAt(cutoff)
                            .once('value');

                        commSnap.forEach(function(c) {
                            var cm = c.val();
                            if (cm && cm.timestamp >= cutoff) {
                                commentsData.push({ ts: cm.timestamp, author: cm.authorName || '?', body: cm.body || '' });
                            }
                        });
                        commentsData.sort(function(a,b){ return a.ts - b.ts; });
                        commentCount += commentsData.length;
                    }

                    var shouldShow = (incTopics && topicInRange) || (incComments && commentsData.length > 0);
                    if (!shouldShow) continue;

                    topicCount++;
                    lines.push('');
                    lines.push('TOPIC: "' + topic.title + '" by ' + topic.authorName + ' [' + formatDate(topic.timestamp) + ']');
                    if (topic.subheading) {
                        lines.push('  Subheading: ' + topic.subheading);
                    }
                    if (incTopics && topic.body && topic.body.trim()) {
                        lines.push('  Body: ' + topic.body.trim().replace(/\n/g, '\n         '));
                    }

                    if (incComments) {
                        if (commentsData.length === 0) {
                            lines.push('  (no new comments in this period)');
                        } else {
                            commentsData.forEach(function(cm) {
                                lines.push('  [' + formatDate(cm.ts) + '] ' + cm.author + ': ' + cm.body);
                            });
                        }
                    }
                }

                lines.push('');
            }

            lines.push('=== END OF REPORT ===');
            var summary = [];
            if (incChat) summary.push(chatCount + ' chat messages');
            if (incNeighbourhood) summary.push(neighbourhoodCount + ' neighbourhood posts, ' + neighbourhoodCommentCount + ' neighbourhood comments');
            if (incTopics || incComments) summary.push(topicCount + ' topics active, ' + commentCount + ' topic comments');
            lines.push('Summary: ' + summary.join(' | '));

            document.getElementById('output-text').value = lines.join('\n');
            document.getElementById('output-area').style.display = 'flex';

            var statsHtml = '';
            if (incChat) statsHtml += '<span class="stat-item">Chat: <strong>' + chatCount + '</strong></span>';
            if (incNeighbourhood) statsHtml += '<span class="stat-item">Neighbourhood posts: <strong>' + neighbourhoodCount + '</strong></span><span class="stat-item">Neighbourhood comments: <strong>' + neighbourhoodCommentCount + '</strong></span>';
            if (incTopics || incComments) statsHtml += '<span class="stat-item">Topics: <strong>' + topicCount + '</strong></span>';
            if (incComments) statsHtml += '<span class="stat-item">Topic comments: <strong>' + commentCount + '</strong></span>';
            document.getElementById('stats-row').innerHTML = statsHtml;

            setStatus('Done. ' + chatCount + ' chat messages, ' + neighbourhoodCount + ' neighbourhood posts, ' + topicCount + ' topics, ' + commentCount + ' topic comments fetched.');
        } catch (err) {
            console.error(err);
            setStatus('Error: ' + (err.message || err));
        }

        btn.disabled = false;
    }

    function statusLabel(status) {
        if (!status) return '';
        if (status.startsWith('dry_run_would_nuke')) return '<span class="badge badge-dryrun">DRY: would nuke</span>';
        if (status.startsWith('dry_run_would_timeout')) return '<span class="badge badge-dryrun">DRY: would timeout ' + (status.match(/\d+/) || ['?'])[0] + 'h</span>';
        if (status === 'nuked_immediate') return '<span class="badge badge-nuke">NUKED</span>';
        if (status === 'nuked_escalated') return '<span class="badge badge-nuke">NUKED (strikes)</span>';
        if (status.startsWith('timed_out')) return '<span class="badge badge-timeout">TIMEOUT ' + (status.match(/\d+/) || ['?'])[0] + 'h</span>';
        if (status === 'skipped_cooldown') return '<span class="badge badge-skip">skipped (cooldown)</span>';
        if (status === 'not_found') return '<span class="badge badge-skip">not found</span>';
        if (status === 'error') return '<span class="badge badge-error">error</span>';
        return '<span class="badge">' + escapeHtml(status) + '</span>';
    }

    async function fetchAutomodLog() {
        var automodStatus = document.getElementById('automod-status');
        var logEntries = document.getElementById('log-entries');
        var strikesGrid = document.getElementById('strikes-grid');
        automodStatus.textContent = 'Loading automod data...';

        var limit = parseInt(document.getElementById('log-limit').value, 10);

        // Fetch log and strikes in parallel
        try {
            var [logSnap, strikesSnap] = await Promise.all([
                rtdb.ref('automod_log').orderByKey().limitToLast(limit).once('value'),
                rtdb.ref('automod_strikes').once('value')
            ]);

            // ── Strike Records ─────────────────────────────────────────────────
            var strikesData = strikesSnap.val() || {};
            var strikeUids = Object.keys(strikesData).filter(uid => {
                var s = strikesData[uid];
                return s && s.count && s.count > 0;
            });

            if (strikeUids.length === 0) {
                strikesGrid.innerHTML = '<div class="no-data">No active strike records.</div>';
            } else {
                // Resolve usernames in parallel
                var nameMap = {};
                await Promise.all(strikeUids.map(async function(uid) {
                    nameMap[uid] = await resolveUid(uid);
                }));

                // Sort by strike count desc, then last strike ts desc
                strikeUids.sort(function(a, b) {
                    var sa = strikesData[a], sb = strikesData[b];
                    return (sb.count - sa.count) || ((sb.lastStrikeAt || 0) - (sa.lastStrikeAt || 0));
                });

                var html = '';
                var now = Date.now();
                var windowMs = 30 * 24 * 60 * 60 * 1000;
                strikeUids.forEach(function(uid) {
                    var s = strikesData[uid];
                    var atLimit = s.count >= STRIKE_LIMIT;
                    var recentStrikes = (s.strikes || []).filter(function(st) { return st.ts >= now - windowMs; });
                    var lastStrike = recentStrikes.length ? recentStrikes[recentStrikes.length - 1] : null;
                    var timeoutLabel = lastStrike && lastStrike.hours
                        ? lastStrike.hours + 'h timeout'
                        : (atLimit ? 'banned' : 'no timeout');
                    var strikeDetails = recentStrikes.map(function(st) {
                        var duration = st.hours ? st.hours + 'h timeout' : 'no timeout';
                        return '[' + formatDate(st.ts) + '] ' + duration + ' — ' + escapeHtml(st.reason || '');
                    }).join(' | ');
                    html += '<div class="strike-row">'
                        + '<span class="strike-user">' + escapeHtml(nameMap[uid] || uid) + '</span>'
                        + '<span class="strike-count' + (atLimit ? ' at-limit' : '') + '">' + s.count + '/' + STRIKE_LIMIT + '</span>'
                        + '<span class="strike-timeout">' + escapeHtml(timeoutLabel) + '</span>'
                        + '<span class="strike-history">Last: ' + formatDate(s.lastStrikeAt) + ' &nbsp;|&nbsp; ' + strikeDetails + '</span>'
                        + '</div>';
                });
                strikesGrid.innerHTML = html;
            }

            // ── Log Entries ────────────────────────────────────────────────────
            var logData = logSnap.val() || {};
            var logKeys = Object.keys(logData).reverse(); // newest first

            if (logKeys.length === 0) {
                logEntries.innerHTML = '<div class="no-data">No automod runs recorded yet.</div>';
                automodStatus.textContent = 'No runs found.';
                return;
            }

            var actionRuns = 0;
            var html = '';
            logKeys.forEach(function(key) {
                var entry = logData[key];
                if (!entry) return;

                var hasActions = Array.isArray(entry.actions) && entry.actions.length > 0;
                var nonSkipped = hasActions ? entry.actions.filter(function(a) {
                    return a.status && !a.status.startsWith('skipped') && a.status !== 'not_found';
                }) : [];
                if (nonSkipped.length > 0) actionRuns++;

                var runBadge = entry.dryRun
                    ? '<span class="badge badge-dryrun">DRY RUN</span>'
                    : '<span class="badge badge-live">LIVE</span>';

                var actionsHtml = '';
                if (hasActions) {
                    actionsHtml = '<div class="log-actions">';
                    entry.actions.forEach(function(a) {
                        actionsHtml += '<div class="log-action-row">'
                            + statusLabel(a.status)
                            + '<span class="log-action-user">' + escapeHtml(a.username || '?') + '</span>'
                            + '<span class="log-action-reason">' + escapeHtml((a.reason || '').substring(0, 120)) + '</span>'
                            + '</div>';
                    });
                    actionsHtml += '</div>';
                } else {
                    actionsHtml = '<div class="log-action-row" style="color:#aaa;font-style:italic;">No actions taken.</div>';
                }

                html += '<div class="log-entry">'
                    + '<div class="log-header">'
                    + '<span class="log-time">' + formatDate(entry.ts) + '</span>'
                    + runBadge
                    + (entry.error ? '<span class="badge badge-error">ERROR: ' + escapeHtml(entry.error) + '</span>' : '')
                    + '</div>'
                    + '<div class="log-summary">' + escapeHtml(entry.summary || '—') + '</div>'
                    + actionsHtml
                    + '</div>';
            });

            logEntries.innerHTML = html;
            automodStatus.textContent = logKeys.length + ' runs loaded, ' + actionRuns + ' with actions. ' + strikeUids.length + ' user(s) with active strikes.';
        } catch (err) {
            console.error(err);
            automodStatus.textContent = 'Error loading automod data: ' + (err.message || err);
        }
    }

    var STRIKE_LIMIT = 3;

    function copyOutput() {
        var ta = document.getElementById('output-text');
        ta.select();
        ta.setSelectionRange(0, 99999999);
        if (navigator.clipboard) {
            navigator.clipboard.writeText(ta.value).then(function() {
                setStatus('Copied to clipboard.');
            });
        } else {
            document.execCommand('copy');
            setStatus('Copied to clipboard.');
        }
    }
</script>
</body>
</html>

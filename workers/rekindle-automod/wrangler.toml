name = "rekindle-automod"
main = "worker.js"
compatibility_date = "2024-12-05"

[ai]
binding = "AI"

[triggers]
crons = ["*/10 * * * *"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# Required secrets (set via: npx wrangler secret put SECRET_NAME)
# FIREBASE_CLIENT_EMAIL  — service account email from Firebase Console
# FIREBASE_PRIVATE_KEY   — service account private key (paste full PEM including headers)
